# Example Claudespace configuration
version: 1

setup:
  # Repository to clone
  git_url: "https://github.com/yourcompany/yourproject.git"
  branch: "main"
  clone_depth: 1  # Use 0 for full history
  
  # Commands to run after cloning
  install:
    - name: "Install Python dependencies"
      command: "python -m pip install -r requirements.txt"
    - name: "Install Node dependencies"
      command: "npm install"
    
  # Commands to run after Docker services are up
  post_start:
    - name: "Run database migrations"
      command: "python manage.py migrate"
      wait_for: ["db"]  # Wait for db service to be healthy
    - name: "Seed database"
      command: "python manage.py seed"
      wait_for: ["db"]

# Map Docker services to environment variables
services:
  # Simple format - just list env vars that contain the service's connection info
  db:
    env_vars: [DATABASE_URL, DB_HOST, DB_PORT]
  
  redis:
    env_vars: [REDIS_URL, CACHE_URL]
  
  # Advanced format - explicit port mapping (rarely needed)
  postgres:
    env_mappings:
      - var: DATABASE_URL
        replace_port: 5432  # Replace this port in the env var
      - var: PG_PORT
        replace_value: "5432"  # Simple string replacement

# Environment files to update with new ports
env_files:
  - .env
  - backend/.env
  - frontend/.env
